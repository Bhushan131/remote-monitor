<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Admin Panel</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>🔧 Admin Panel</h1>
        </header>
        
        <div class="main">
            <aside class="sidebar">
                <button onclick="showTab('devices')" class="active">📱 Devices</button>
                <button onclick="showTab('monitor')">📺 Monitor</button>
                <button onclick="showTab('add')">➕ Add Device</button>
            </aside>
            
            <main class="content">
                <div id="devices" class="tab active">
                    <h2>Connected Devices</h2>
                    <div id="deviceList"></div>
                </div>
                
                <div id="monitor" class="tab">
                    <h2>Device Monitor</h2>
                    <div id="monitorContent">
                        <p>Select a device first</p>
                    </div>
                </div>
                
                <div id="add" class="tab">
                    <h2>Add New Device</h2>
                    <input type="text" id="childName" placeholder="Enter child name">
                    <button onclick="generateLink()">Generate Link</button>
                    <div id="linkBox" style="display:none;">
                        <input type="text" id="installLink" readonly>
                        <button onclick="copyLink()">Copy Link</button>
                    </div>
                </div>
            </main>
        </div>
    </div>
    <script src="admin.js"></script>
</body>
</html>
